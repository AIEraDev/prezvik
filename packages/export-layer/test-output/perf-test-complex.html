<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/theme/black.css">
  <style>
/* Base styles */
.reveal {
  font-family: Open Sans, sans-serif;
}

.reveal h1, .reveal h2, .reveal h3 {
  font-family: Montserrat, sans-serif;
}

/* Slide container */
.reveal .slides section {
  position: relative;
  width: 100%;
  height: 100%;
}

/* Decorations layer */
.slide-decorations {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* Content layer */
.slide-content {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 10;
}

/* Text content */
.text-content {
  box-sizing: border-box;
}

/* Image content */
.image-content {
  overflow: hidden;
}

/* Responsive design */
@media (max-width: 768px) {
  .text-content {
    font-size: 0.8em;
  }
}
  </style>
</head>
<body>
<div class="reveal">
  <div class="slides">

        </svg>
        <svg class="shape-decoration" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">

  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
  <script>

      transition: 'slide',

      progress: true,
      center: false,
      width: 960,

      margin: 0,
      minScale: 0.2,
      maxScale: 2.0
    });

</body>
</html>
